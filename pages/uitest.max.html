<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Bubble & Ice Float</title>

<style>
body{
  margin:0;
  background:#0b1d2a;
  overflow:hidden;
}

canvas{
  display:block;
}
</style>
</head>
<body>

<script src="matter.js"></script>
<script>

const Engine = Matter.Engine;
const Render = Matter.Render;
const Runner = Matter.Runner;
const Bodies = Matter.Bodies;
const Composite = Matter.Composite;
const Events = Matter.Events;

const engine = Engine.create();
const world = engine.world;

/* 重力を下ではなく弱く */
engine.gravity.y = 0.1;

const width = window.innerWidth;
const height = window.innerHeight;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: width,
        height: height,
        wireframes: false,
        background:"#0b1d2a"
    }
});

Render.run(render);
Runner.run(Runner.create(), engine);


/* 壁 */
const wallLeft = Bodies.rectangle(-50,height/2,100,height,{isStatic:true});
const wallRight = Bodies.rectangle(width+50,height/2,100,height,{isStatic:true});
const floor = Bodies.rectangle(width/2,height+50,width,100,{isStatic:true});
const ceiling = Bodies.rectangle(width/2,-50,width,100,{isStatic:true});

Composite.add(world,[wallLeft,wallRight,floor,ceiling]);


/* 泡生成 */
function createBubble(){

  const r = 6 + Math.random()*10;

  const bubble = Bodies.circle(
    Math.random()*width,
    height + 20,
    r,
    {
      frictionAir:0.02,
      restitution:0.8,
      render:{
        fillStyle:"rgba(180,220,255,0.25)",
        strokeStyle:"rgba(220,240,255,0.6)",
        lineWidth:1
      }
    }
  );

  bubble.isBubble = true;

  Composite.add(world,bubble);
}

/* 氷生成 */
function createIce(){

  const size = 20 + Math.random()*10;

  const ice = Bodies.rectangle(
    Math.random()*width,
    height + 30,
    size,
    size,
    {
      frictionAir:0.01,
      restitution:0.2,
      chamfer:{radius:4},
      render:{
        fillStyle:"rgba(200,240,255,0.85)",
        strokeStyle:"rgba(220,255,255,0.9)",
        lineWidth:1
      }
    }
  );

  ice.isIce = true;

  Composite.add(world,ice);
}


/* 定期生成 */
setInterval(createBubble,300);
setInterval(createIce,1500);


/* 浮力処理 */
Events.on(engine,"beforeUpdate",function(){

  const bodies = Composite.allBodies(world);

  bodies.forEach(b=>{

    if(b.isBubble){
      Matter.Body.applyForce(b,b.position,{x:0,y:-0.0008});
    }

    if(b.isIce){
      Matter.Body.applyForce(b,b.position,{x:0,y:-0.0003});
    }

  });

});

</script>
</body>
</html>
