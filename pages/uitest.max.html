<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>炭酸の泡アニメーション（修正版）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(to top,#1E3C72,#2A5298);
  overflow:hidden;
}

canvas{
  display:block;
}
</style>
</head>
<body>

<script>

const Engine = Matter.Engine,
      Render = Matter.Render,
      World  = Matter.World,
      Bodies = Matter.Bodies,
      Body   = Matter.Body,
      Runner = Matter.Runner,
      Events = Matter.Events;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element:document.body,
  engine:engine,
  options:{
    width:window.innerWidth,
    height:window.innerHeight,
    wireframes:false,
    background:"transparent"
  }
});

Render.run(render);

const runner = Runner.create();
Runner.run(runner,engine);



function createBubble(){

  const radius = 5 + Math.random()*15;

  const opacity = 0.3 + (radius-5)/15 * 0.7;

  // 半径³比例浮力
  const buoyancy = 0.00002 * Math.pow(radius,3);

  const bubble = Bodies.circle(

    window.innerWidth*0.3 + Math.random()*window.innerWidth*0.4,
    window.innerHeight + radius,
    radius,

    {

      restitution:0.8,

      // 修正版：必ず正になる式
      frictionAir:0.01 + (15-radius)*0.001,

      collisionFilter:{
        group:-1
      },

      render:{
        fillStyle:`rgba(255,255,255,${opacity})`,
        strokeStyle:`rgba(255,255,255,${Math.min(opacity*1.5,1)})`,
        lineWidth:1
      },

      custom:{
        buoyancy:buoyancy
      }

    });

  World.add(world,bubble);

  return bubble;
}



const bubbles = [];
const maxBubbles = 50;

for(let i=0;i<maxBubbles;i++){
  bubbles.push(createBubble());
}



Events.on(engine,"beforeUpdate",()=>{

  bubbles.forEach((bubble,i)=>{

    const sway = (Math.random()-0.5)*0.00005;

    Body.applyForce(
      bubble,
      bubble.position,
      {
        x:sway,
        y:-bubble.custom.buoyancy
      }
    );

    if(bubble.position.y < -50){

      Body.setPosition(
        bubble,
        {
          x:window.innerWidth*0.3 + Math.random()*window.innerWidth*0.4,
          y:window.innerHeight + bubble.circleRadius
        }
      );

      Body.setVelocity(bubble,{x:0,y:0});
    }

    if(Math.random() < 0.01){
      World.remove(world,bubble);
      bubbles[i] = createBubble();
    }

  });

});


window.addEventListener("resize",()=>{

  render.canvas.width = window.innerWidth;
  render.canvas.height = window.innerHeight;

});


</script>

</body>
</html>
