<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>炭酸泡＋氷アニメーション（独立浮遊）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(to top,#1E3C72,#2A5298);
}
canvas{
  display:block;
}
</style>
</head>
<body>

<script>
const Engine = Matter.Engine,
      Render = Matter.Render,
      World = Matter.World,
      Bodies = Matter.Bodies,
      Body = Matter.Body,
      Runner = Matter.Runner,
      Events = Matter.Events;

const engine = Engine.create();
const world = engine.world;

/* Renderer */
const render = Render.create({
  element: document.body,
  engine: engine,
  options:{
    width: window.innerWidth,
    height: window.innerHeight,
    wireframes:false,
    background:"transparent"
  }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

/* ----------------
   Bubbles
---------------- */
function createBubble(){
  const radius = 5 + Math.random()*15;
  const opacity = 0.3 + (radius-5)/15 * 0.7;
  const buoyancy = 0.0003 + (radius-5)/15 * 0.0007;

  const bubble = Bodies.circle(
    Math.random()*window.innerWidth,
    window.innerHeight + radius,
    radius,
    {
      restitution:0.8,
      frictionAir:0.02,
      render:{
        fillStyle:`rgba(255,255,255,${opacity})`
      },
      custom:{
        buoyancy:buoyancy
      }
    }
  );
  World.add(world,bubble);
  return bubble;
}

const bubbles = [];
const maxBubbles = 50;
for(let i=0;i<maxBubbles;i++) bubbles.push(createBubble());

/* ----------------
   Ice
---------------- */
function createIce(){
  const size = 40 + Math.random()*30;
  const ice = Bodies.rectangle(
    Math.random()*window.innerWidth,
    Math.random()*window.innerHeight*0.7,
    size,
    size,
    {
      chamfer:{radius:8},
      restitution:0.2,
      frictionAir:0.05,
      render:{
        fillStyle:"rgba(220,240,255,0.6)",
        strokeStyle:"rgba(255,255,255,0.9)",
        lineWidth:2
      },
      custom:{
        buoyancy:0.0002 + Math.random()*0.0003
      }
    }
  );
  World.add(world,ice);
  return ice;
}

const ices = [];
for(let i=0;i<5;i++) ices.push(createIce());

/* ----------------
   Update
---------------- */
Events.on(engine,"beforeUpdate",()=>{

  // Bubble: 天井まで浮上して止まる
  bubbles.forEach(bubble=>{
    Body.applyForce(bubble,bubble.position,{x:0,y:-bubble.custom.buoyancy});

    if(bubble.position.y - bubble.circleRadius < 0){
      Body.setPosition(bubble,{
        x:bubble.position.x,
        y:bubble.circleRadius
      });
      Body.setVelocity(bubble,{x:0,y:0});
    }
  });

  // Ice: 浮力でゆらゆら浮く、画面内に留まる
  ices.forEach(ice=>{
    Body.applyForce(ice,ice.position,{x:0,y:-ice.custom.buoyancy});

    // 上端・下端で反発
    if(ice.position.y - ice.bounds.max.y + ice.bounds.min.y < 20){
      Body.setVelocity(ice,{x:0,y:0.5});
    }
    if(ice.position.y + ice.bounds.max.y - ice.bounds.min.y > window.innerHeight - 20){
      Body.setVelocity(ice,{x:0,y:-0.5});
    }
  });

});

/* Resize */
window.addEventListener("resize",()=>{
  render.canvas.width = window.innerWidth;
  render.canvas.height = window.innerHeight;
});

</script>
</body>
</html>
