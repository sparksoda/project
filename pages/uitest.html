<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>炭酸の泡アニメーション（大きさ・透明度・浮力連動）</title>
<script src="matter.min.js"></script>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to top, #1E3C72, #2A5298);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    blur: 1;
    
  }

  canvas {
    display: block;
  }

  /* 中央のテキスト用 */
  #window {
    position: absolute;
    z-index: 10; /* canvasより前面に表示 */
    color: white;
    font-size: 30px;
    font-family: sans-serif;
    width: 75%;
    height: 75%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px) saturate(1.2);
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 24px;
    padding: 40px 60px;
  }
</style>
</head>
<body>

<div id="window">
  <h1>hello</h1>
</div>

<script src="bubbles.js"></script>

</body>
</html>
