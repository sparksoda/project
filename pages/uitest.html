<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>炭酸の泡アニメーション</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background-color: #1E90FF; /* 青色背景 */
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }

  .bubble {
    position: absolute;
    bottom: 0;
    width: 10px;
    height: 10px;
    background-color: rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: rise 5s linear infinite;
  }

  @keyframes rise {
    0% {
      transform: translateY(0) scale(0.5);
      opacity: 0;
    }
    10% {
      opacity: 1;
    }
    100% {
      transform: translateY(-100vh) scale(1.2);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<script>
  const numBubbles = 50; // 泡の数
  for (let i = 0; i < numBubbles; i++) {
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    bubble.style.left = Math.random() * window.innerWidth + 'px'; // ランダムな水平位置
    bubble.style.animationDuration = 3 + Math.random() * 4 + 's'; // ランダムな速度
    bubble.style.width = 5 + Math.random() * 15 + 'px'; // ランダムなサイズ
    bubble.style.height = bubble.style.width;
    document.body.appendChild(bubble);
  }
</script>

</body>
</html>
