<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テストページ</title>

<style>

body{
  margin:0;
  height:100vh;
  background: linear-gradient(to top,#1E3C72,#2A5298);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* 共通ウィンドウ */
.window{
  position:absolute;
  color:white;
  font-family:sans-serif;
  text-align:center;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);

  border:2px solid rgba(255,255,255,0.25);
  border-radius:24px;

  padding:40px;

  opacity:0;
  pointer-events:none;

  transition:opacity 1s;
}

/* 表示状態 */
.show{
  opacity:1;
  pointer-events:auto;
}

/* サインイン */
#signin{
  width:300px;
  height:220px;
}

/* メインウィンドウ */
#main{
  width:75%;
  height:75%;
}

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>
<body>

<!-- サインイン -->
<div id="signin" class="window show">

<h2>サインイン</h2>

<input placeholder="ユーザー名"><br><br>
<input type="password" placeholder="パスワード"><br>

<button id="nextBtn">次に進む</button>

</div>

<!-- メイン -->
<div id="main" class="window">

<h1>hello</h1>

</div>


<script>

const signin = document.getElementById("signin");
const main = document.getElementById("main");
const nextBtn = document.getElementById("nextBtn");

nextBtn.onclick = () => {

  // サインイン消す
  signin.classList.remove("show");

  // 少し待ってから表示
  setTimeout(()=>{
    main.classList.add("show");
  },1000);

};

</script>

</body>
</html>
