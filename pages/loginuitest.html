<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パスワード保護ページ</title>
    <style>
        #content {
            display: none; /* 初期状態は非表示 */
        }
    </style>
</head>
<body>
    <div id="passwordDiv">
        <label for="passwordInput">パスワードを入力してください:</label>
        <input type="password" id="passwordInput">
        <button onclick="checkPassword()">確認</button>
        <p id="error" style="color:red; display:none;">パスワードが間違っています。</p>
    </div>

    <div id="content">
        <h1>秘密のコンテンツ</h1>
        <p>ここに本当に見せたい内容を書きます。</p>
    </div>

    <script>
        const correctPassword = "1234"; // パスワード設定

        // ページ読み込み時の処理
        window.onload = function() {
            // セッションストレージに「アクセス済み」フラグがあればパスワード不要
            if (sessionStorage.getItem("passwordVerified") === "true") {
                document.getElementById("passwordDiv").style.display = "none";
                document.getElementById("content").style.display = "block";
            }
        }

        // パスワードチェック関数
        function checkPassword() {
            const input = document.getElementById("passwordInput").value;
            if (input === correctPassword) {
                // 正しいパスワードならコンテンツ表示
                document.getElementById("passwordDiv").style.display = "none";
                document.getElementById("content").style.display = "block";

                // セッションストレージにフラグを保存
                sessionStorage.setItem("passwordVerified", "true");
            } else {
                // 間違った場合
                document.getElementById("error").style.display = "block";
            }
        }
    </script>
</body>
</html>
